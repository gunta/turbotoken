name: turbotoken
description: The fastest BPE tokenizer on every platform. Drop-in replacement for tiktoken.
version: 0.1.0
homepage: https://github.com/nicebytes/turbotoken

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  ffi: ^2.1.0
  path: ^1.8.0
  path_provider: ^2.1.0
  http: ^1.1.0

dev_dependencies:
  test: ^1.24.0
  ffigen: ^9.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
