<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Icon: lightning bolt in rounded square -->
  <rect width="44" height="44" y="2" rx="10" fill="#0b0b10"/>
  <rect width="44" height="44" y="2" rx="10" stroke="url(#border)" stroke-width="1.5" fill="none"/>
  <path d="M25.5 8L14 24h8l-1 12 12-16h-8l.5-12z" fill="url(#bolt)"/>
  <!-- Wordmark -->
  <text x="56" y="34" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="30" letter-spacing="-1" fill="#f4f4f6">turbo<tspan fill="url(#wordAccent)">token</tspan></text>
  <defs>
    <linearGradient id="bolt" x1="14" y1="8" x2="33" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4400"/>
      <stop offset=".45" stop-color="#ff5c1a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="wordAccent" x1="56" y1="10" x2="240" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5c1a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="2" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5c1a" stop-opacity=".3"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity=".15"/>
    </linearGradient>
  </defs>
</svg>
