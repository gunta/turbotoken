name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  benchmark-cpu-gates:
    name: Linux x86_64 CPU Regression Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          check-latest: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install uv + deps
        run: |
          python -m pip install -U pip uv
          uv venv .venv
          uv pip install --python .venv/bin/python -e .[dev]
          bun install --frozen-lockfile

      - name: Build native library
        run: zig build -Doptimize=ReleaseFast

      - name: Run benchmark governance gates (CPU)
        env:
          TURBOTOKEN_BENCH_INCLUDE_CUDA: "0"
        run: bun run scripts/ci-benchmark.ts --mode=cpu --profile=linux-x86_64-cpu

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-cpu-results
          path: bench/results/*.json

  benchmark-metal-gates:
    name: Metal Regression Gates
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          check-latest: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install uv + deps
        run: |
          python -m pip install -U pip uv
          uv venv .venv
          uv pip install --python .venv/bin/python -e .[dev]
          bun install --frozen-lockfile

      - name: Build native library
        run: zig build -Doptimize=ReleaseFast

      - name: Run benchmark governance gates (Metal)
        env:
          TURBOTOKEN_BENCH_INCLUDE_CUDA: "0"
        run: bun run scripts/ci-benchmark.ts --mode=gpu --profile=macos-arm64-metal

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-metal-results
          path: bench/results/*.json

  benchmark-baseline-refresh-dry-run:
    name: Baseline Refresh Dry Run
    if: always()
    needs:
      - benchmark-cpu-gates
      - benchmark-metal-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*-results
          merge-multiple: true
          path: bench/results

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Run baseline refresh dry-run
        run: bun run scripts/refresh-ci-gates-baselines.ts --dry-run

      - name: Upload baseline refresh summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline-refresh-dry-run
          path: bench/results/ci-gates-refresh-*.json
