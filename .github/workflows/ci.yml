name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          check-latest: true
      - name: Install test deps
        run: |
          python -m pip install -U pip uv
          uv pip install --system -e .[dev] || python -m pip install -e .[dev]
      - name: Run python tests
        run: pytest -q
