name: Wheels

on:
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install uv + deps
        run: |
          python -m pip install -U pip uv
          uv venv .venv
          uv pip install --python .venv/bin/python -e .[dev]
          bun install

      - name: Build and verify platform-tagged wheels
        run: bun run build:wheels

      - name: Upload wheel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: |
            dist/wheels/*.whl
            dist/wheels/build-wheels-*.json
